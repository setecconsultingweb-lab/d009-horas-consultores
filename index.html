<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>D009 · Controle de Horas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px 20px}
.logo{width:64px;height:64px;background:#e85d00;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px}
h1{font-size:22px;font-weight:600;color:#1a1a18;margin-bottom:6px}
p{font-size:14px;color:#9a9990;margin-bottom:40px}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border:2px solid #e0ddd8;border-radius:16px;padding:36px 44px;cursor:pointer;text-decoration:none;transition:all .2s;min-width:200px}
.card:hover{border-color:#e85d00;box-shadow:0 4px 20px rgba(232,93,0,.15);transform:translateY(-3px)}
.card-icon{font-size:40px;margin-bottom:14px}
.card-title{font-size:16px;font-weight:600;color:#1a1a18;margin-bottom:6px}
.card-desc{font-size:12px;color:#9a9990}
</style>
</head>
<body>
<div class="container">
  <div class="logo">⏱</div>
  <h1>D009 · Controle de Horas</h1>
  <p>Selecione seu perfil para continuar</p>
  <div class="cards">
    <a class="card" href="consultor.html">
      <div class="card-icon">👤</div>
      <div class="card-title">Consultor</div>
      <div class="card-desc">Lançar horas e salvar dados do mês</div>
    </a>
    <a class="card" href="gestor.html">
      <div class="card-icon">📊</div>
      <div class="card-title">Gestor</div>
      <div class="card-desc">Visão consolidada — acesso restrito</div>
    </a>
    <a class="card" href="financeiro.html">
      <div class="card-icon">💼</div>
      <div class="card-title">Financeiro</div>
      <div class="card-desc">Notas fiscais e aprovações — acesso restrito</div>
    </a>
    <a class="card" href="financeiro.html">
      <div class="card-icon">💰</div>
      <div class="card-title">Financeiro</div>
      <div class="card-desc">Status de aprovação — acesso restrito</div>
    </a>
  </div>
</div>
</body>
</html>
